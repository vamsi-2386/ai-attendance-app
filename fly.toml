# fly.toml app configuration file generated for ai-attendance-app

app = "ai-attendance-app"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_PATH = "/data/app.db"

[mounts]
  source = "sqlite_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
